substitutions:
  _REGION: us-central1
  _SERVICE_NAME: microsaas-factory
  _REPOSITORY: microsaas-factory
  _IMAGE_NAME: web
  _IMAGE_TAG: latest

steps:
  - name: node:20-bookworm-slim
    entrypoint: npm
    args: ["ci"]

  - name: node:20-bookworm-slim
    entrypoint: npm
    args: ["run", "lint"]

  - name: node:20-bookworm-slim
    entrypoint: npm
    args: ["test"]

  - name: node:20-bookworm-slim
    entrypoint: npm
    args: ["run", "build"]

  - name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-t",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}",
        ".",
      ]

  - name: gcr.io/cloud-builders/docker
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}",
      ]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "${_SERVICE_NAME}",
        "--image",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}",
        "--region",
        "${_REGION}",
        "--platform",
        "managed",
        "--allow-unauthenticated",
        "--quiet",
      ]

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:${_IMAGE_TAG}"
